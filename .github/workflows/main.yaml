name: ML CI/CD — Lab5 (Airflow DAG + Docker)

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install flake8
        run: pip install flake8

      - name: Lint src/ and dags/
        run: |
          flake8 src/ dags/ tests/ \
            --count --select=E9,F63,F7,F82 \
            --show-source --statistics


  dag-test:
    name: DAG Integrity Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install apache-airflow==2.9.1 \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.1/constraints-3.11.txt"
          pip install pytest

      - name: Initialize Airflow DB
        run: |
          export AIRFLOW_HOME=${{ github.workspace }}/.airflow
          airflow db init
        env:
          AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      - name: Run DAG integrity tests
        run: |
          export AIRFLOW_HOME=${{ github.workspace }}/.airflow
          export ML_PROJECT_PATH=${{ github.workspace }}
          pytest tests/test_dag.py -v --tb=short
        env:
          AIRFLOW__CORE__LOAD_EXAMPLES: "false"

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --target runtime \
            --tag ml-creditcard:ci-test \
            --file Dockerfile \
            .

      - name: Verify image was built
        run: |
          docker images ml-creditcard:ci-test
          echo "Docker image built successfully!"

  ml-tests:
    name: ML Tests + Quality Gate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cml

      - name: Run pre-train tests
        run: |
          pytest tests/test_model.py::TestDataValidation \
                 tests/test_model.py::TestConfigValidation \
                 -v --tb=short

      - name: Train model (CI mode)
        env:
          CI: "true"
          MAX_ROWS: "5000"
          MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"
        run: |
          python src/train.py --n_estimators 20 --max_depth 6

      - name: Run post-train tests + Quality Gate
        env:
          F1_THRESHOLD: "0.70"
          ACCURACY_THRESHOLD: "0.90"
        run: |
          pytest tests/test_model.py::TestArtifacts \
                 tests/test_model.py::TestQualityGate \
                 -v --tb=short

      - name: Create CML report (PR only)
        if: github.event_name == 'pull_request'
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## ML Pipeline Report — Lab5" > report.md
          echo "" >> report.md
          echo "### Metrics" >> report.md
          echo '```json' >> report.md
          cat metrics.json >> report.md
          echo '```' >> report.md
          echo "" >> report.md
          echo "### Confusion Matrix" >> report.md
          cml publish confusion_matrix.png --md >> report.md
          echo "" >> report.md
          echo "### CI Jobs Status" >> report.md
          echo "| Job | Status |" >> report.md
          echo "|-----|--------|" >> report.md
          echo "| Lint | Passed |" >> report.md
          echo "| DAG Integrity | Passed |" >> report.md
          echo "| Docker Build | Passed |" >> report.md
          echo "| ML Tests + Quality Gate | Passed |" >> report.md
          cml comment create report.md

      - name: Upload artifacts (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ml-artifacts-lab5
          path: |
            metrics.json
            confusion_matrix.png